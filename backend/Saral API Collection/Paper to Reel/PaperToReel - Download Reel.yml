info:
  name: PaperToReel - Download Reel
  type: http
  seq: 72

http:
  method: GET
  url: http://localhost:8080/api/papertoreel/:run_id/download
  headers:
    - name: X-User-ID
      value: testuser1
  params:
    - name: run_id
      value: your-run-id-here
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
