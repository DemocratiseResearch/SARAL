info:
  name: PaperToVideo - Get Audio Slide
  type: http
  seq: 30

http:
  method: GET
  url: http://localhost:8080/api/papertovideo/:run_id/audio/:slide_index
  headers:
    - name: X-User-ID
      value: testuser1
  params:
    - name: run_id
      value: your-run-id-here
      type: path
    - name: slide_index
      value: "0"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
