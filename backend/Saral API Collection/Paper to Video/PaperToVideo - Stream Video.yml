info:
  name: PaperToVideo - Stream Video
  type: http
  seq: 33

http:
  method: GET
  url: http://localhost:8080/api/papertovideo/:run_id/video
  headers:
    - name: X-User-ID
      value: testuser1
    - name: Range
      value: bytes=0-
  params:
    - name: run_id
      value: your-run-id-here
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
