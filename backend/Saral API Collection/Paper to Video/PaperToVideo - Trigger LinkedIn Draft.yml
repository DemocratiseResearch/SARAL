info:
  name: PaperToVideo - Trigger LinkedIn Draft
  type: http
  seq: 34

http:
  method: POST
  url: http://localhost:8080/api/papertovideo/:run_id/social/linkedin
  headers:
    - name: X-User-ID
      value: testuser1
  params:
    - name: run_id
      value: your-run-id-here
      type: path
  body:
    type: json
    data: |-
      {
        "title": "My Research Paper",
        "description": "A brief description of the paper."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
