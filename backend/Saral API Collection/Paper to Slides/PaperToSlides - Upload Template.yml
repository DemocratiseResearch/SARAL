info:
  name: PaperToSlides - Upload Template
  type: http
  seq: 44

http:
  method: POST
  url: http://localhost:8080/api/papertoslides/:run_id/template
  headers:
    - name: X-User-ID
      value: testuser1
  params:
    - name: run_id
      value: your-run-id-here
      type: path
  body:
    type: multipart-form
    data:
      - name: template
        type: file
        value: []
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
