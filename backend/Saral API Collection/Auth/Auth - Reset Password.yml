info:
  name: Auth - Reset Password
  type: http
  seq: 10

http:
  method: POST
  url: http://localhost:8080/auth/email/reset-password
  body:
    type: json
    data: |-
      {
        "oob_code": "firebase_oob_code_here",
        "new_password": "newsecurepassword"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
